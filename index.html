<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yoop - Google Login</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-card {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
      width: 320px;
    }

    h2 {
      color: #333;
      margin-bottom: 20px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin-bottom: 10px;
      transition: background 0.3s;
    }

    .login-btn {
      background-color: #4285F4;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .login-btn:hover {
      background-color: #357ae8;
    }

    .logout-btn {
      background-color: #db4437;
      color: white;
    }

    .logout-btn:hover {
      background-color: #c33d2e;
    }

    #user-info {
      margin-top: 20px;
      color: #333;
      font-weight: bold;
      word-break: break-all;
    }

    .hidden {
      display: none;
    }
  </style>
  <script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-analytics.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyDuOOYL6J0Pm2gFGCr--aqC_Qm2gmjgmLI",
    authDomain: "yoodatabse.firebaseapp.com",
    projectId: "yoodatabse",
    storageBucket: "yoodatabse.firebasestorage.app",
    messagingSenderId: "656448661573",
    appId: "1:656448661573:web:fd1ddc233d1db837b71b2c",
    measurementId: "G-DS1B2FLDT3"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
</script>
</head>
<body>

  <div class="login-card">
    <h2>Welcome to Yoop</h2>
    
    <!-- Login Button -->
    <button id="login-btn" class="btn login-btn" onclick="loginWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
        <path d="M9.003 18c2.43 0 4.467-.806 5.956-2.18l-2.909-2.26c-.806.54-1.836.86-3.047.86-2.344 0-4.328-1.584-5.036-3.711H.96v2.332C2.44 15.983 5.485 18 9.003 18z" fill="#34A853"/>
        <path d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.71 0-.593.102-1.17.282-1.71V4.96H.957C.347 6.175 0 7.55 0 9.002c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9.003 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.464.891 11.428 0 9.002 0 5.485 0 2.44 2.017.96 4.958L3.967 7.29c.708-2.127 2.692-3.71 5.036-3.71z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>

    <!-- Logout Button (Hidden by default) -->
    <button id="logout-btn" class="btn logout-btn hidden" onclick="logout()">Logout</button>

    <h3 id="user-info"></h3>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
      getAuth, 
      GoogleAuthProvider, 
      signInWithPopup,
      signOut,
      onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // Your provided Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCdzS0FQUQ8gFQWZkpZJpXyELzkhukeeaU",
      authDomain: "yoop-b1331.firebaseapp.com",
      projectId: "yoop-b1331",
      storageBucket: "yoop-b1331.firebasestorage.app",
      messagingSenderId: "430378029646",
      appId: "1:430378029646:web:d4fb1b1feac577e9e8a91f",
      measurementId: "G-T5PLLYWX5H"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Reference to UI elements
    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const userInfo = document.getElementById('user-info');

    // Login Function
    window.loginWithGoogle = async function () {
      try {
        await signInWithPopup(auth, provider);
      } catch (error) {
        console.error("Error Code:", error.code);
        console.error("Error Message:", error.message);
        
        if (error.code === 'auth/unauthorized-domain') {
            alert("This domain is not authorized in Firebase Console. Go to Authentication > Settings > Authorized domains and add this domain.");
        } else {
            alert(error.message);
        }
      }
    }

    // Logout Function
    window.logout = async function () {
      await signOut(auth);
    }

    // Detect User State Changes
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // User is signed in.
        userInfo.innerText = "Welcome, " + user.displayName;
        userInfo.innerHTML += `<br><small>${user.email}</small>`;
        
        loginBtn.classList.add('hidden');
        logoutBtn.classList.remove('hidden');
      } else {
        // User is signed out.
        userInfo.innerText = "";
        
        loginBtn.classList.remove('hidden');
        logoutBtn.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
