<!DOCTYPE html>
<html>
<head>
  <title>Google Login</title>
</head>
<body>

  <h2>Login with Google</h2>

  <button onclick="loginWithGoogle()">Login with Google</button>
  <button onclick="logout()">Logout</button>

  <h3 id="user"></h3>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
      getAuth, 
      GoogleAuthProvider, 
      signInWithPopup,
      signOut,
      onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCdzS0FQUQ8gFQWZkpZJpXyELzkhukeeaU",
      authDomain: "yoop-b1331.firebaseapp.com",
      projectId: "yoop-b1331",
      storageBucket: "yoop-b1331.firebasestorage.app",
      messagingSenderId: "430378029646",
      appId: "1:430378029646:web:d4fb1b1feac577e9e8a91f",
      measurementId: "G-T5PLLYWX5H"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Login
    window.loginWithGoogle = async function () {
      try {
        await signInWithPopup(auth, provider);
      } catch (error) {
        alert(error.message);
        console.error(error);
      }
    }

    // Logout
    window.logout = async function () {
      await signOut(auth);
    }

    // Detect user
    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById("user").innerText =
          "Logged in: " + user.displayName + " (" + user.email + ")";
      } else {
        document.getElementById("user").innerText = "Not logged in";
      }
    });
  </script>

</body>
</html>
